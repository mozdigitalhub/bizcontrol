name: QA CI/CD

on:
  push:
    branches:
      - qa
  workflow_dispatch:

concurrency:
  group: qa-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate QA branch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "false"
          USE_SPACES: "false"
          DATABASE_URL: sqlite:///db.sqlite3
        run: |
          python manage.py migrate --noinput
          python manage.py check

      - name: Run tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "false"
          USE_SPACES: "false"
          DATABASE_URL: sqlite:///db.sqlite3
        run: |
          python manage.py test --verbosity 2

  deploy-qa:
    name: Deploy to QA server
    runs-on: ubuntu-latest
    needs:
      - validate
    if: ${{ secrets.QA_HOST != '' && secrets.QA_USER != '' && secrets.QA_SSH_KEY != '' && secrets.QA_DEPLOY_PATH != '' }}
    environment:
      name: qa
    steps:
      - name: Deploy branch qa over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          port: ${{ secrets.QA_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.QA_DEPLOY_PATH }}
            git fetch origin
            git checkout qa
            git pull origin qa
            if [ -n "${{ secrets.QA_POST_DEPLOY_COMMAND }}" ]; then
              eval "${{ secrets.QA_POST_DEPLOY_COMMAND }}"
            fi

  deploy-qa-not-configured:
    name: Deploy skipped (missing QA secrets)
    runs-on: ubuntu-latest
    needs:
      - validate
    if: ${{ !(secrets.QA_HOST != '' && secrets.QA_USER != '' && secrets.QA_SSH_KEY != '' && secrets.QA_DEPLOY_PATH != '') }}
    steps:
      - name: Show setup instructions
        run: |
          echo "QA deploy skipped."
          echo "Configure secrets: QA_HOST, QA_USER, QA_SSH_KEY, QA_DEPLOY_PATH."
          echo "Optional: QA_PORT, QA_POST_DEPLOY_COMMAND."
