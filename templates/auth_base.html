<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BizControl{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand: #1f6f8b;
        --brand-dark: #154c61;
        --surface: #ffffff;
        --muted: #6d7b86;
        --shadow: 0 18px 40px rgba(24, 42, 56, 0.12);
      }

      body {
        font-family: "Manrope", sans-serif;
        background: radial-gradient(circle at top left, #f8fbfd 0%, #eef4f8 40%, #e9f1f6 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .auth-shell {
        width: 100%;
        max-width: 980px;
        background: var(--surface);
        border-radius: 26px;
        box-shadow: var(--shadow);
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        overflow: hidden;
      }

      .auth-hero {
        background: linear-gradient(165deg, var(--brand), var(--brand-dark));
        color: #fff;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 16px;
      }

      .auth-hero h1 {
        font-size: 26px;
        margin: 0;
      }

      .auth-hero p {
        margin: 0;
        opacity: 0.85;
      }

      .auth-card {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .auth-input {
        width: 100%;
        border: 1px solid #e2e8ee;
        border-radius: 12px;
        padding: 12px 14px;
        background: #fbfdff;
      }

      .auth-card label {
        font-weight: 600;
        margin-bottom: 6px;
      }

      .auth-muted {
        color: var(--muted);
        font-size: 13px;
      }

      .btn-primary {
        background: var(--brand);
        border: none;
      }

      @media (max-width: 900px) {
        .auth-shell {
          grid-template-columns: 1fr;
        }
        .auth-hero {
          display: none;
        }
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="auth-shell">
      <section class="auth-hero">
        <h1>BizControl</h1>
        <p>Controlo simples do teu negocio com foco em vendas, stock e fiado.</p>
        <div class="mt-2">
          <span class="badge text-bg-light text-dark">MZN</span>
          <span class="badge text-bg-light text-dark">IVA incluido</span>
          <span class="badge text-bg-light text-dark">Multi-tenant</span>
        </div>
      </section>
      <section class="auth-card">
        {% include "partials/messages.html" %}
        {% block content %}{% endblock %}
      </section>
    </div>
  </body>
</html>
