<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BizControl{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-600: #2563EB;
        --primary-700: #1D4ED8;
        --secondary-600: #0F766E;
        --secondary-500: #14B8A6;
        --success: #16A34A;
        --warning: #F59E0B;
        --danger: #DC2626;
        --info: #0284C7;
        --bg: #F8FAFC;
        --card: #FFFFFF;
        --border: #E5E7EB;
        --text: #0F172A;
        --muted: #475569;
        --shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .auth-shell {
        width: 100%;
        max-width: 980px;
        background: var(--card);
        border-radius: 16px;
        box-shadow: var(--shadow);
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .auth-hero {
        background: var(--primary-600);
        color: #FFFFFF;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 16px;
      }

      .auth-hero h1 {
        font-size: 26px;
        margin: 0;
      }

      .auth-hero p {
        margin: 0;
        opacity: 0.85;
      }

      .auth-card {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .auth-input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: #FFFFFF;
      }

      .auth-input:focus {
        outline: none;
        border-color: var(--primary-600);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      }

      .form-control {
        border-radius: 8px;
        border: 1px solid var(--border);
        height: 40px;
        padding: 10px 12px;
        background: #FFFFFF;
        font-size: 14px;
      }

      .auth-field-with-icon {
        position: relative;
      }

      .auth-field-with-icon .auth-field-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #94A3B8;
        pointer-events: none;
        z-index: 3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .auth-field-with-icon .auth-input,
      .auth-field-with-icon .form-control {
        padding-left: 40px;
      }

      .form-control:focus {
        border-color: var(--primary-600);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      }

      .auth-card label {
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .auth-muted {
        color: var(--muted);
        font-size: 12px;
      }

      .btn-primary {
        background: var(--primary-600);
        border: 1px solid var(--primary-600);
      }

      .btn-primary:hover {
        background: var(--primary-700);
        border-color: var(--primary-700);
      }

      .toast-container {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 1100;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bc-toast {
        background: var(--card);
        border: 1px solid var(--border);
        border-left: 4px solid var(--info);
        border-radius: 12px;
        padding: 12px 16px;
        box-shadow: var(--shadow);
        min-width: 260px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
      }

      .bc-toast--success { border-left-color: var(--success); }
      .bc-toast--warning { border-left-color: var(--warning); }
      .bc-toast--danger { border-left-color: var(--danger); }

      @media (max-width: 900px) {
        .auth-shell {
          grid-template-columns: 1fr;
        }
        .auth-hero {
          display: none;
        }
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="auth-shell">
      <section class="auth-hero">
        <h1>BizControl</h1>
        <p>Controlo simples do teu negócio com foco em vendas, stock e crédito.</p>
        <div class="mt-2">
          <span class="badge text-bg-light text-dark">MZN</span>
          <span class="badge text-bg-light text-dark">IVA incluido</span>
          <span class="badge text-bg-light text-dark">Multi-tenant</span>
        </div>
      </section>
      <section class="auth-card">
        {% include "partials/messages.html" %}
        {% block content %}{% endblock %}
      </section>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.lucide) {
          window.lucide.createIcons();
        }
        document.querySelectorAll("a.btn, button.btn").forEach(function (btn) {
          if (btn.classList.contains("btn-icon-only") || btn.dataset.iconOnly === "true") {
            return;
          }
          if (btn.querySelector("[data-lucide], svg.lucide, .btn-icon")) {
            return;
          }
          if (!btn.textContent || !btn.textContent.trim()) {
            return;
          }
          var iconName = btn.dataset.icon;
          if (!iconName) {
            if (btn.classList.contains("btn-danger") || btn.classList.contains("btn-outline-danger")) {
              iconName = "trash-2";
            } else if (btn.classList.contains("btn-primary")) {
              iconName = "check-circle";
            } else {
              iconName = "arrow-right";
            }
          }
          var icon = document.createElement("i");
          icon.setAttribute("data-lucide", iconName);
          icon.classList.add("btn-icon");
          btn.prepend(icon);
        });
        if (window.lucide) {
          window.lucide.createIcons();
        }
        document.querySelectorAll("[data-auto-dismiss]").forEach(function (el) {
          var delay = parseInt(el.dataset.autoDismiss || "4000", 10);
          setTimeout(function () {
            el.remove();
          }, delay);
        });
      });
    </script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
