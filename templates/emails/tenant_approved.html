<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conta aprovada</title>
    <style>
      body { font-family: Arial, sans-serif; background: #F8FAFC; margin: 0; padding: 0; }
      .wrapper { max-width: 600px; margin: 24px auto; background: #FFFFFF; border-radius: 12px; padding: 24px; }
      .brand { color: #2563EB; font-weight: 700; }
      .card { background: #F8FAFC; padding: 16px; border-radius: 10px; margin-top: 16px; }
      .cta { margin-top: 16px; padding: 12px 16px; background: #2563EB; color: #FFFFFF; border-radius: 8px; display: inline-block; text-decoration: none; }
      .muted { color: #475569; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="brand">BizControl</div>
      <h2>Conta aprovada</h2>
      <p>O seu negocio <strong>{{ business.name }}</strong> foi aprovado. Pode entrar com os dados abaixo:</p>
      <div class="card">
        <p><strong>Utilizador:</strong> {{ owner.email }}</p>
        <p><strong>Password temporaria:</strong> {{ temp_password }}</p>
      </div>
      <a class="cta" href="{{ login_url }}">Entrar no BizControl</a>
      <p class="muted">Na primeira entrada vai ser solicitado que altere a password.</p>
    </div>
  </body>
</html>
