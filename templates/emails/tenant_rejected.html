<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registo nao aprovado</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f7f9; margin: 0; padding: 0; }
      .wrapper { max-width: 600px; margin: 24px auto; background: #ffffff; border-radius: 12px; padding: 24px; }
      .brand { color: #1f6f8b; font-weight: 700; }
      .muted { color: #6d7b86; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="brand">BizControl</div>
      <h2>Registo nao aprovado</h2>
      <p>O registo do negocio <strong>{{ business.name }}</strong> nao foi aprovado.</p>
      <p class="muted">
        Se tiver alguma questao, por favor contacte o suporte do BizControl para mais informacoes.
      </p>
      <p class="muted">Obrigado pela sua compreensao.</p>
    </div>
  </body>
</html>
