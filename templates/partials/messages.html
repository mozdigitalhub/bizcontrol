{% if messages %}
  <div class="toast-container">
    {% for message in messages %}
      {% if "error" in message.tags %}
        <div class="bc-toast bc-toast--danger" role="status" data-auto-dismiss="4000">
          <i data-lucide="alert-triangle"></i>
          <span>{{ message }}</span>
        </div>
      {% elif "warning" in message.tags %}
        <div class="bc-toast bc-toast--warning" role="status" data-auto-dismiss="4000">
          <i data-lucide="alert-circle"></i>
          <span>{{ message }}</span>
        </div>
      {% elif "success" in message.tags %}
        <div class="bc-toast bc-toast--success" role="status" data-auto-dismiss="4000">
          <i data-lucide="check-circle"></i>
          <span>{{ message }}</span>
        </div>
      {% else %}
        <div class="bc-toast" role="status" data-auto-dismiss="4000">
          <i data-lucide="info"></i>
          <span>{{ message }}</span>
        </div>
      {% endif %}
    {% endfor %}
  </div>
{% endif %}
