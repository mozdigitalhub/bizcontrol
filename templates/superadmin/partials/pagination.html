{% if page.paginator.num_pages > 1 %}
  <nav class="mt-3">
    <ul class="pagination pagination-sm mb-0">
      {% if page.has_previous %}
        <li class="page-item">
          <a class="page-link" href="?page={{ page.previous_page_number }}">Anterior</a>
        </li>
      {% else %}
        <li class="page-item disabled"><span class="page-link">Anterior</span></li>
      {% endif %}

      <li class="page-item disabled">
        <span class="page-link">Pagina {{ page.number }} de {{ page.paginator.num_pages }}</span>
      </li>

      {% if page.has_next %}
        <li class="page-item">
          <a class="page-link" href="?page={{ page.next_page_number }}">Seguinte</a>
        </li>
      {% else %}
        <li class="page-item disabled"><span class="page-link">Seguinte</span></li>
      {% endif %}
    </ul>
  </nav>
{% endif %}
